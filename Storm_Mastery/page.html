<!DOCTYPE html>
<html lang="en">
	<script src="./calc_code.js"></script>
	<link rel="stylesheet" href="./styles.css"></script>
	<head>
		<title>Storm Mastery Calculator</title>
	</head>
	<body>
		<p style="font-size:24pt; font-family: monospace; text-shadow: 0px 0px 30px"><b>Storm Mastery Calculator</b></p>
		Pick a storm: <select id="storm">
			<option value="magnet">Magnet Storm</option>
			<option value="tire">Tire Storm</option>
			<option value="GS">GS Storm</option>
			<option value="wrench">Wrench Storm</option>
			<option value="beam">Beam Storm</option>
		</select><br>
		Current level: <input type="number" id="current_lvl" value="0"><br>
		Expected level: <input type="number" id="expected_lvl" value="1"></input><br>
		Current progress: <input type="number" id="progress" value="0"></input> / <span id="max_progress">100</span><br>
		<br>
		<p>Current boost: +<span id="boost0" class="value">0%</span></p>
		<p>Expected boost: +<span id="boost1" class="value">1%</span></p>
		<p>It will take <span id="cost0" class="value">100</span> items to reach this level, which is equal to <span id="cost1" class="value">3</span> storms</p>
		<p>Expected time: <span id="expectedtime" class="value">0</span> hours (assuming 1 of each storm every 25 mins)</p>
		<p style="font-size: 8pt; font-family:math">Calc made by {UB} qwerx</p>
	</body>
</html>
