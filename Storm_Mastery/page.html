<!DOCTYPE html>
<html lang="en">
	<script src="./calc_code.js"></script>
	<link rel="stylesheet" href="./styles.css"></script>
	<head>
		<title>Storm Mastery Calculator</title>
	</head>
	<body>
		<p style="font-size:24pt; font-family: monospace; text-shadow: 0px 0px 30px"><b>Storm Mastery Calculator</b></p>
		Pick a storm: <select id="storm">
			<option value="magnet">Magnet Storm</option>
			<option value="tire">Tire Storm</option>
			<option value="GS">GS Storm</option>
			<option value="wrench">Wrench Storm</option>
			<option value="beam">Beam Storm</option>
		</select><br>
		Current level: <input type="number" id="current_lvl" placeholder="0"><br>
		Expected level: <input type="number" id="expected_lvl" placeholder="1"></input><br>
		<br>
		<p>Current boost: +<span id="boost0" style="font-size:14pt; color:#002000; text-shadow: 0px 0px 12px">0%</span></p>
		<p>Expected boost: +<span id="boost1" style="font-size:14pt; color:#002000; text-shadow: 0px 0px 12px">1%</span></p>
		<p>It will take <span id="cost0" style="font-size:14pt; color:#202020; text-shadow: 0px 0px 12px">100</span> items to level up, which is equal to <span id="cost1" style="font-size:14pt; color:#303030; text-shadow: 0px 0px 12px">3</span> storms</p>
		<p>Expected time: <span id="expectedtime" style="font-size:14pt; color:#202020; text-shadow: 0px 0px 12px">0</span> seconds (assuming 1 of each storm every 25 mins)</p>
	</body>
</html>
